; STS2 iOS 导出预设（基线版）
; 注：部分字段（team_id 等签名信息）需用户的开发者身份，装机时填。
; 结构对齐 Godot 4.5.1 iOS preset；模板导入后用编辑器打开会补全缺省字段。

[preset.0]

name="iOS"
platform="iOS"
runnable=true
advanced_options=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="build/StS2.ipa"
patches=PackedStringArray()
encryption_include_filters=""
encryption_exclude_filters=""
seed=0
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

[preset.0.options]

custom_template/debug=""
custom_template/release=""
architectures/arm64=true
application/app_store_team_id=""
application/bundle_identifier="com.yourname.sts2"
application/signature=""
application/short_version="0.107.1"
application/version="0.107.1"
application/min_ios_version="14.0"
application/icon_interpolation=4
capabilities/access_wifi=false
; GDExtension iOS 库由 build-ios.sh 放到 addons/，Godot 导出自动收集 .framework/.xcframework
; FMOD 静态库(.a)需作为额外链接：见 addons/fmod/libs/ios/*.a
rendering/rendering_method="forward_plus"
